<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="css/index.css">
    <meta name="viewport" content="width=device-width, initial-scale=1"/>

    <title>Title</title>
    <style>

        body {
            margin: 200px;
        }
        .container {
            width: 200px;
            animation-name: took-took;
            animation-duration: 1s;
            animation-iteration-count: infinite;
        }

        .wrapper {
            display: flex;
        }
        .circle {
            width: 100px;
            height: 100px;
            background-color: red;
            border-radius: 50%;
        }

        .square {
            margin: -56px auto;
            width: 102px;
            height: 102px;
            background-color: red;
            transform: rotate(45deg);
        }

        @keyframes took-took {
            from {
                transform: scale(1);
            }
            to {
                transform: scale(2);
            }
        }

    </style>
</head>

<body>
<div class="container">
    <div class="wrapper">
        <div class="circle">

        </div>
        <div class="circle">

        </div>
    </div>
    <div class="square">

    </div>

</div>
</body>
</html>
